version: 2
description: >-
  Sub-agent dispatch configuration (v2: prototype-based, complexity-driven).
  agent-factory reads prototypes and instantiates roles by S/C/N/K factors.
  Legacy `roles` kept for backward compatibility (used when prototypes absent).

# 角色原型模板：agent-factory 按 S/C/N/K 因子实例化
# count 为公式字符串（agent-factory 求值）或整数；condition 为门控谓词
prototypes:
  planner:
    responsibilities:
      - design API contracts
      - define component structure
      - create task decomposition
    receives:
      - task definition
    produces:
      - API contracts
      - component specs
      - execution plan
    count: 1

  executor:
    responsibilities:
      - implement features
      - write code
      - fix bugs
    receives:
      - execution plan
      - API contracts
      - component specs
    produces:
      - source code
      - test code
    count: "ceil(S/2)"

  verifier:
    responsibilities:
      - run tests
      - check consistency
      - validate outputs
    receives:
      - source code
      - test code
      - acceptance criteria
    produces:
      - test results
      - verification report
    count: 1

  security-reviewer:
    condition: "C>=4"
    responsibilities:
      - review security posture
      - verify authn/authz
      - check secret handling
    receives:
      - source code
      - security guardrails
    produces:
      - security review report
    count: 1

  integration-checker:
    condition: "K>=3"
    responsibilities:
      - verify cross-component contracts
      - check integration points
      - validate handoffs
    receives:
      - source code
      - API contracts
    produces:
      - integration report
    count: 1

  knowledge-curator:
    condition: "N>=3"
    responsibilities:
      - assemble domain context
      - surface relevant known-patterns
      - brief executors on novelty surface
    receives:
      - long-term memory
      - knowledge index
    produces:
      - context brief
    count: 1

# 向后兼容：旧格式 roles 保留。agent-factory 在无 prototypes 时回退使用。
# 新生成项目优先用 prototypes。
roles:
  - name: planner
    responsibilities:
      - design API contracts
      - define component structure
      - create task decomposition
    receives:
      - task definition
    produces:
      - API contracts
      - component specs
      - execution plan

  - name: executor
    responsibilities:
      - implement features
      - write code
      - fix bugs
    receives:
      - execution plan
      - API contracts
      - component specs
    produces:
      - source code
      - test code

  - name: verifier
    responsibilities:
      - run tests
      - check consistency
      - validate outputs
    receives:
      - source code
      - test code
      - acceptance criteria
    produces:
      - test results
      - verification report
