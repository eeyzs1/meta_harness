version: 2
description: >-
  Sub-agent dispatch configuration (v2: prototype-based, complexity-driven).
  agent-factory reads prototypes and instantiates roles by S/C/N/K factors.
  Legacy `roles` kept for backward compatibility (used when prototypes absent).

# 角色原型模板：agent-factory 按 S/C/N/K 因子实例化
# count 为公式字符串（agent-factory 求值）或整数；condition 为门控谓词
#
# boundaries.cannot / boundaries.max_context_lines / requires_human_review
# 是硬约束字段——agent-factory 保留它们派生 task card 的 context firewall。
# LLM 填项目特定 sub-agent-dispatch.yaml 时必须为每个 prototype 声明这 3 项，
# 否则 dispatcher 会落到 DEFAULT_CANNOT / DEFAULT_MAX_CONTEXT_LINES，
# 违背"项目特定边界由 LLM 声明"的分工原则。
# 下面是通用种子示范；工业控制等强约束项目应改写 cannot 列表更严格。
prototypes:
  planner:
    responsibilities:
      - design API contracts
      - define component structure
      - create task decomposition
    receives:
      - task definition
    produces:
      - API contracts
      - component specs
      - execution plan
    count: 1
    boundaries:
      cannot:
        - "write production code (only specs/contracts)"
        - "skip acceptance-criteria traceability"
      max_context_lines: 600
    requires_human_review: false

  executor:
    responsibilities:
      - implement features
      - write code
      - fix bugs
    receives:
      - execution plan
      - API contracts
      - component specs
    produces:
      - source code
      - test code
    count: "ceil(S/2)"
    boundaries:
      cannot:
        - "modify files outside can_write scope"
        - "self-certify completion without running verification"
        - "skip audit_log on control commands"
      max_context_lines: 800
    requires_human_review: false

  verifier:
    responsibilities:
      - run tests
      - check consistency
      - validate outputs
    receives:
      - source code
      - test code
      - acceptance criteria
    produces:
      - test results
      - verification report
    count: 1
    boundaries:
      cannot:
        - "modify source code under test"
        - "mark criteria passed without evidence"
      max_context_lines: 500
    requires_human_review: false

  security-reviewer:
    condition: "C>=4"
    responsibilities:
      - review security posture
      - verify authn/authz
      - check secret handling
    receives:
      - source code
      - security guardrails
    produces:
      - security review report
    count: 1
    boundaries:
      cannot:
        - "accept self-signed certificates in production"
        - "approve plaintext storage of secrets/PII"
        - "skip audit_log review"
      max_context_lines: 600
    requires_human_review: true

  integration-checker:
    condition: "K>=3"
    responsibilities:
      - verify cross-component contracts
      - check integration points
      - validate handoffs
    receives:
      - source code
      - API contracts
    produces:
      - integration report
    count: 1
    boundaries:
      cannot:
        - "modify component interfaces to force a pass"
        - "skip handoff-format validation"
      max_context_lines: 600
    requires_human_review: false

  knowledge-curator:
    condition: "N>=3"
    responsibilities:
      - assemble domain context
      - surface relevant known-patterns
      - brief executors on novelty surface
    receives:
      - long-term memory
      - knowledge index
    produces:
      - context brief
    count: 1
    boundaries:
      cannot:
        - "fabricate domain facts not present in memory"
        - "exceed context budget allocated to executors"
      max_context_lines: 400
    requires_human_review: false

# 向后兼容：旧格式 roles 保留。agent-factory 在无 prototypes 时回退使用。
# 新生成项目优先用 prototypes。
roles:
  - name: planner
    responsibilities:
      - design API contracts
      - define component structure
      - create task decomposition
    receives:
      - task definition
    produces:
      - API contracts
      - component specs
      - execution plan

  - name: executor
    responsibilities:
      - implement features
      - write code
      - fix bugs
    receives:
      - execution plan
      - API contracts
      - component specs
    produces:
      - source code
      - test code

  - name: verifier
    responsibilities:
      - run tests
      - check consistency
      - validate outputs
    receives:
      - source code
      - test code
      - acceptance criteria
    produces:
      - test results
      - verification report
